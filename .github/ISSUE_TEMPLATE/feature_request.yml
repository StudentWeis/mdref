name: Feature Request
description: Propose a new feature or enhancement.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it worth doing?
      placeholder: As a user of mdref, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the change. Include CLI examples, API sketches, or pseudo-code if helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why they were rejected.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete, testable conditions that mark this issue as done.
      placeholder: |
        - [ ] Command X accepts flag Y
        - [ ] Output format Z is supported
        - [ ] Covered by tests
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which module is primarily affected?
      options:
        - find
        - mv
        - rename
        - core
        - cli
        - bench
        - release
        - other / cross-cutting
    validations:
      required: true
